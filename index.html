 <!DOCTYPE html>
<html lang="es">
 <head>
   <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda/Topic Card</title>
  <link rel="stylesheet" href="style.css">
 </head>
 <body>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="number-circle">1</div>
        <div class="header-content">
          <h2 class="card-title">Agenda/Topic</h2>
          <p class="card-code">SAAS-0000</p>
        </div>
        <div class="icon-grid">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
        </div>
      </div>

      <div class="card-body">
        <p class="description">Description of what is done here</p>
      </div>

      <div class="card-footer">
        <p class="last-updated">Last Updated</p>
        <p class="date">3/8/2020</p>
      </div>
    </div>
  </div>
 </body>
 </html>
